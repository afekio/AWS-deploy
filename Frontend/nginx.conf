server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # --- 1. Health Checks ---
    location = /api/auth/health {
        proxy_pass http://172.0.1.53:5001/health;
    }
    location = /api/provision/health {
        proxy_pass http://172.0.1.6:5000/health;
    }

    # --- 2. Auth Service (PRIORITY) ---
    # This block handles LOGIN, REGISTER, PROFILE, and PASSWORD
    location ~ ^/api/(auth|login|register|user) {
        # If the request has /api/auth/ (like in React), strip the 'auth' part
        rewrite ^/api/auth/(.*) /api/$1 break;
        
        proxy_pass http://172.0.1.53:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- 3. Provisioning Service ---
    location /api/provision {
        proxy_pass http://172.0.1.6:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 4. React Frontend ---
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}